# ── App ──────────────────────────────────────────
spring.application.name=FinSight
server.port=8080

# ── MySQL datasource ─────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/finsight_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Abdullah@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Connection pool (HikariCP) ────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ──────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ── Fixes MySQL ENUM + JSON serialisation ─────────
spring.jpa.properties.hibernate.globally_quoted_identifiers=false
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250

# ── Security ─────────────────────────────────────
jwt.secret=finsight-super-secret-key-2025-minimum-256bits!
spring.mvc.static-path-pattern=/static/**
spring.web.resources.add-mappings=false